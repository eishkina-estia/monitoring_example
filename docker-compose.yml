services:
  train:
    profiles: ["training"]
    build: .
    container_name: wine_model_train
    working_dir: /app
    volumes:
      - ./:/app
#      - ./data:/app/data
#      - ./mlruns:/app/mlruns
#      - ./mlflow.db:/app/mlflow.db
#      - ./config.yml:/app/config.yml
    command: python -m src.training.run_training_pipeline

  api:
    build: .
    container_name: wine_api
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
#      - ./data:/app/data
#      - ./mlruns:/app/mlruns
#      - ./mlflow.db:/app/mlflow.db
#      - ./config.yml:/app/config.yml
    command: uvicorn src.serving.api:app --host 0.0.0.0 --port 8000

  prometheus:
    image: prom/prometheus:latest
    container_name: wine_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./src/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api